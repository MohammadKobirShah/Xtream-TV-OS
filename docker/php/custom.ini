; ============================================================
;  XtreamTV IPTV OS — PHP Runtime Configuration
;  Developer: Kobir Shah
; ============================================================

[PHP]
; ── Error Handling ─────────────────────────────────────────
display_errors        = Off
display_startup_errors= Off
log_errors            = On
error_log             = /var/www/html/xtreamtv/storage/logs/php_error.log
error_reporting       = E_ALL & ~E_DEPRECATED & ~E_STRICT

; ── Performance ────────────────────────────────────────────
memory_limit          = 512M
max_execution_time    = 300
max_input_time        = 120
default_socket_timeout= 60
realpath_cache_size   = 4096K
realpath_cache_ttl    = 600

; ── File Upload (for M3U file imports) ─────────────────────
file_uploads          = On
upload_max_filesize   = 200M
post_max_size         = 210M
max_file_uploads      = 5

; ── Session Security ────────────────────────────────────────
session.cookie_httponly = 1
session.cookie_samesite = Strict
session.use_strict_mode = 1
session.gc_maxlifetime  = 604800
session.save_path       = /var/www/html/xtreamtv/storage/sessions

; ── OPcache (production speed) ─────────────────────────────
[opcache]
opcache.enable          = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files   = 10000
opcache.revalidate_freq = 60
opcache.fast_shutdown   = 1
opcache.enable_cli      = 0

; ── cURL ────────────────────────────────────────────────────
[curl]
; Ensure cURL follows redirects by default for stream proxying
