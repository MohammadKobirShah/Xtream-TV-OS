# ============================================================
#  XtreamTV IPTV OS — Apache Virtual Host Configuration
#  Developer: Kobir Shah
# ============================================================

<VirtualHost *:80>
    ServerName localhost
    ServerAlias 127.0.0.1
    DocumentRoot /var/www/html

    # ── Security Headers ─────────────────────────────────
    Header always set X-Powered-By "XtreamTV/2.0 by Kobir Shah"
    Header always set X-Developer "Kobir Shah"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src * data:; media-src *; connect-src *;"
    Header unset Server

    # ── App Root ─────────────────────────────────────────
    <Directory /var/www/html>
        Options -Indexes -MultiViews +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # ── Protect storage ───────────────────────────────────
    <Directory /var/www/html/xtreamtv/storage>
        Order allow,deny
        Deny from all
    </Directory>

    # ── Gzip Compression ─────────────────────────────────
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/css application/json application/x-mpegurl
    </IfModule>

    # ── Xtream Codes URL Routing ──────────────────────────
    <IfModule mod_rewrite.c>
        RewriteEngine On

        # /live/{user}/{pass}/{id}.ts  → live stream
        RewriteRule ^xtreamtv/live/([^/]+)/([^/]+)/([0-9]+)\.(ts|m3u8)$ /xtreamtv/live_stream.php?username=$1&password=$2&id=$3&ext=$4 [L,QSA]

        # /player_api.php → xtream compatible
        RewriteRule ^xtreamtv/get\.php$ /xtreamtv/api.php [L,QSA]
    </IfModule>

    # ── Logging ───────────────────────────────────────────
    ErrorLog  ${APACHE_LOG_DIR}/xtreamtv_error.log
    CustomLog ${APACHE_LOG_DIR}/xtreamtv_access.log combined
</VirtualHost>
